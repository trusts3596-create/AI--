<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智慧旅游规划助手 - TravelBot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">
    <script>
        // 设置设备类型数据供JavaScript使用
        window.deviceType = '{{ device_type }}';
        window.userAgent = '{{ request.headers.get("User-Agent", "") }}';
    </script>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <span class="logo-icon">🌍</span>
                <span class="logo-text">TravelBot</span>
            </div>
            <button class="sidebar-close" id="sidebarClose" aria-label="关闭菜单">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="sidebar-content">
            <button class="new-chat-btn" id="newChatBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                开始新对话
            </button>
            
            <!-- 采纳建议：快捷标签样式 - 胶囊按钮（Chips） -->
            <div class="sidebar-chips">
                <span class="sidebar-chip active" data-prompt="我想去北京玩三天，预算三千，一个人">
                    <span class="sidebar-chip-icon">🏯</span>
                    <span>北京三日游</span>
                </span>
                <span class="sidebar-chip" data-prompt="带家人去三亚度周末，预算五千">
                    <span class="sidebar-chip-icon">🏖️</span>
                    <span>三亚家庭游</span>
                </span>
                <span class="sidebar-chip" data-prompt="和女朋友去日本东京玩一周，预算两万">
                    <span class="sidebar-chip-icon">🗼</span>
                    <span>东京情侣游</span>
                </span>
                <span class="sidebar-chip" data-prompt="成都重庆五日游，和朋友一起，预算人均三千">
                    <span class="sidebar-chip-icon">🐼</span>
                    <span>川渝美食之旅</span>
                </span>
                <span class="sidebar-chip" data-prompt="云南大理丽江七天，预算五千，一个人去">
                    <span class="sidebar-chip-icon">🌺</span>
                    <span>云南自由行</span>
                </span>
            </div>

            <div class="sidebar-section">
                <h3 class="sidebar-section-title">💡 试试这样问我</h3>
                <div class="suggestion-list">
                    <div class="suggestion-item" data-prompt="我想去北京玩三天，预算三千，一个人">
                        <span class="suggestion-icon">🏯</span>
                        <span>北京三日游</span>
                    </div>
                    <div class="suggestion-item" data-prompt="带家人去三亚度周末，预算五千">
                        <span class="suggestion-icon">🏖️</span>
                        <span>三亚家庭游</span>
                    </div>
                    <div class="suggestion-item" data-prompt="和女朋友去日本东京玩一周，预算两万">
                        <span class="suggestion-icon">🗼</span>
                        <span>东京情侣游</span>
                    </div>
                    <div class="suggestion-item" data-prompt="成都重庆五日游，和朋友一起，预算人均三千">
                        <span class="suggestion-icon">🐼</span>
                        <span>川渝美食之旅</span>
                    </div>
                    <div class="suggestion-item" data-prompt="云南大理丽江七天，预算五千，一个人去">
                        <span class="suggestion-icon">🌺</span>
                        <span>云南自由行</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="sidebar-footer">
            <span class="footer-text">TravelBot v1.0</span>
        </div>
    </aside>

    <!-- 主聊天区域 -->
    <main class="chat-container">
        <!-- 顶部导航栏 -->
        <header class="chat-header">
            <!-- 汉堡菜单按钮 - 仅在移动端显示 -->
            <button class="menu-btn" id="menuBtn" aria-label="打开菜单">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12h18M3 6h18M3 18h18"/>
                </svg>
            </button>
            <div class="header-info">
                <span class="header-avatar">🌍</span>
                <div class="header-text">
                    <h1 class="header-title">智慧旅游规划助手</h1>
                    <span class="header-status">在线 · 随时为你服务</span>
                </div>
            </div>
            <!-- 用户信息区域 - 右上角 -->
            <div class="header-user">
                <div class="header-user-avatar">👤</div>
                <button class="reset-btn" id="resetBtn" aria-label="重置对话">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 4v6h6M23 20v-6h-6"/>
                        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 侧边栏遮罩 - 用于移动端 -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- 消息列表 -->
        <div class="messages" id="messages">
            <!-- 欢迎消息（由 JS 动态生成） -->
        </div>

        <!-- 底部输入区 -->
        <footer class="input-area">
            <div class="input-wrapper">
                <textarea
                    class="input-box"
                    id="inputBox"
                    rows="1"
                    placeholder="输入你的旅行需求，例如：我想去成都玩三天..."
                    autofocus
                ></textarea>
                <button class="send-btn" id="sendBtn" aria-label="发送消息">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
            <p class="input-hint">TravelBot 按下 <kbd>Enter</kbd> 发送，<kbd>Shift+Enter</kbd> 换行</p>
        </footer>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
